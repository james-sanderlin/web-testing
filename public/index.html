<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🧪 Browser Test Lab</title>
  <script type="module" src="https://unpkg.com/@material/web/all.js?module"></script>
  <!-- Fine Uploader Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/file-uploader/5.16.2/fine-uploader.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f5f5f5;
    }
    header {
      background: white;
      border-bottom: 1px solid #ddd;
      padding: 1rem;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header-title {
      font-size: 1.2rem;
      font-weight: 500;
      color: #333;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .header-title:hover {
      color: #6366f1;
    }
    #search {
      width: 100%;
      margin-bottom: 0;
      --md-outlined-text-field-container-shape: 4px;
    }
    .nav-search {
      padding: 0 1rem 0.5rem;
      flex-shrink: 0;
    }
    .main-layout {
      display: flex;
      flex: 1 1 auto;
      height: 100%;
      min-height: 0;
    }
    nav {
      width: 240px;
      background: white;
      border-right: 1px solid #ddd;
      padding: 1rem 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #nav-links {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      background: none;
      border: none;
      padding: 0.25rem 1rem 0;
      list-style: none;
      margin: 0;
      flex: 1 1 auto;
      overflow-y: auto;
    }
    #nav-links li {
      cursor: pointer;
      min-width: 120px;
      border-radius: 4px;
      transition: background 0.2s;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      outline: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-section-divider {
      height: 0;
      margin: 0.4rem 1rem;
      border-bottom: 1px solid #e5e5e5;
      padding: 0 !important;
      cursor: default;
    }
    .star-icon {
      font-size: 1.1rem;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      cursor: pointer;
      color: #aaa;
      flex-shrink: 0;
      margin-left: 0.25rem;
    }
    .star-icon.starred {
      opacity: 1;
      color: #f59e0b;
    }
    #nav-links li:hover .star-icon {
      opacity: 1;
    }
    #nav-links li.selected, #nav-links li[aria-selected="true"] {
      background: #e0e7ff;
    }
    #nav-links li:focus {
      box-shadow: 0 0 0 2px #6366f1;
    }
    main#content {
      flex-grow: 1;
      padding: 2rem;
      overflow-y: auto;
      min-width: 0;
    }
  </style>
</head>
<body>
  <header>
    <a class="header-title" id="home-link">🧪 Browser Test Lab</a>
  </header>
  <div class="main-layout">
    <nav>
      <div class="nav-search">
        <md-outlined-text-field
          id="search"
          label="Search"
          type="search"
          autocomplete="off"
        >
          <span slot="leading-icon" class="material-icons">search</span>
          <span slot="trailing-icon" style="font-family:monospace;opacity:0.7;font-size:0.95em;user-select:none;display:flex;align-items:center;">⌘K</span>
        </md-outlined-text-field>
      </div>
      <ul id="nav-links"></ul>
    </nav>
    <main id="content">Loading…</main>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
