<h2>Blob MIME Type Download</h2>
<p>Simulates SendSafely-style in-browser decryption output: the same raw image bytes are wrapped in a Blob with different <code>type</code> values, then downloaded programmatically. Tests whether downstream systems rely on MIME type vs. file extension.</p>
